---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_cloud_integration:
        description: "Run cloud integration tests against a live Proxmox host"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # Lint
  # ------------------------------------------------------------------
  ansible-lint:
    name: Ansible Lint & pycodestyle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-core>=2.16 ansible-lint>=24.2 pycodestyle>=2.11

      - name: Run pycodestyle
        run: >-
          pycodestyle
          --max-line-length=160
          --ignore=E402
          plugins/modules/*.py

      - name: Run ansible-lint
        run: >-
          ansible-lint
          --profile production
          plugins/modules/*.py

  # ------------------------------------------------------------------
  # Sanity (matrix)
  # ------------------------------------------------------------------
  sanity:
    name: "Sanity (ansible ${{ matrix.ansible }} / py${{ matrix.python }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ansible: "2.16"
            python: "3.12"
          - ansible: "2.17"
            python: "3.12"
          - ansible: "2.18"
            python: "3.13"
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/proxmox

      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"

      - name: Install ansible-core
        run: pip install "ansible-core~=${{ matrix.ansible }}.0"

      - name: Run ansible-test sanity
        working-directory: ansible_collections/stevefulme1/proxmox
        run: >-
          ansible-test sanity
          --python "${{ matrix.python }}"
          --skip-test import
          --skip-test pylint
          --skip-test validate-modules
          --skip-test ansible-doc
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}

  # ------------------------------------------------------------------
  # Unit tests
  # ------------------------------------------------------------------
  unit:
    name: "Unit tests (py${{ matrix.python }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"

      - name: Install test dependencies
        run: pip install -r test-requirements.txt

      - name: Run pytest
        run: >-
          pytest tests/unit/
          -v
          --tb=short
          --cov=plugins
          --cov-report=term-missing
          --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-py${{ matrix.python }}
          path: test-results.xml

  # ------------------------------------------------------------------
  # Integration (mocked -- no live API)
  # ------------------------------------------------------------------
  integration-mock:
    name: Integration (mock)
    runs-on: ubuntu-latest
    needs: [ansible-lint, sanity, unit]
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/proxmox

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-core>=2.16 proxmoxer

      - name: Run integration tests (check mode)
        working-directory: ansible_collections/stevefulme1/proxmox
        run: >-
          ansible-test integration
          --python 3.12
          --allow-unsupported
          --check
          proxmox_firewall_rule
          proxmox_sdn_zone
          proxmox_storage
          proxmox_acl
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
        continue-on-error: true

  # ------------------------------------------------------------------
  # Integration (live Proxmox -- manual trigger only)
  # ------------------------------------------------------------------
  integration-cloud:
    name: Integration (cloud)
    runs-on: ubuntu-latest
    needs: [ansible-lint, sanity, unit]
    if: >-
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_cloud_integration == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          path: ansible_collections/stevefulme1/proxmox

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-core>=2.16 proxmoxer

      - name: Run integration tests against live Proxmox
        working-directory: ansible_collections/stevefulme1/proxmox
        run: >-
          ansible-test integration
          --python 3.12
          --allow-unsupported
          proxmox_node_info
          proxmox_firewall_rule
          proxmox_sdn_zone
          proxmox_storage
          proxmox_acl
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}
          PROXMOX_API_HOST: ${{ secrets.PROXMOX_API_HOST }}
          PROXMOX_API_USER: ${{ secrets.PROXMOX_API_USER }}
          PROXMOX_API_PASSWORD: ${{ secrets.PROXMOX_API_PASSWORD }}
          PROXMOX_TEST_NODE: ${{ secrets.PROXMOX_TEST_NODE || 'pve1' }}
