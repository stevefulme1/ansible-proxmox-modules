---
# Proxmox Module Audit Query Configuration
#
# JMESPath/JQ query definitions for extracting and transforming Proxmox
# infrastructure data into a standardized format with canonical facts
# and metadata. Used for infrastructure auditing and compliance reporting.

# =============================================================================
# SDN — Software-Defined Networking
# =============================================================================
stevefulme1.proxmox.proxmox_sdn_zone:
  query: >-
    .zone | select(. != null) | {
      name: ("sdn_zone:" + (. | tostring)),
      canonical_facts: {
        module: "proxmox_sdn_zone",
        id: .
      },
      facts: {
        infra_type: "PrivateCloud",
        infra_bucket: "Network",
        device_type: "SDN Zone"
      }
    }
