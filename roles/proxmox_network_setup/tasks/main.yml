---
# tasks/main.yml for proxmox_network_setup
# Configure bridges, VLANs, and bonds

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - proxmox_network_setup_host is defined
    fail_msg: "proxmox_network_setup_host must be defined"
    quiet: true

- name: Execute proxmox network setup
  ansible.builtin.debug:
    msg: >-
      Configure bridges, VLANs, and bonds.
      Target: {{ proxmox_network_setup_host }}
