---
argument_specs:
  main:
    short_description: "Rolling upgrade of Proxmox cluster"
    options:
      proxmox_upgrade_host:
        description: Target host address
        type: str
        required: true
      proxmox_upgrade_username:
        description: Authentication username
        type: str
      proxmox_upgrade_password:
        description: Authentication password
        type: str
      proxmox_upgrade_api_key:
        description: API key for authentication
        type: str
      proxmox_upgrade_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      proxmox_upgrade_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
