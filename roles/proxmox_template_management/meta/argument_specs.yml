---
argument_specs:
  main:
    short_description: "Create and manage VM/CT templates"
    options:
      proxmox_template_management_host:
        description: Target host address
        type: str
        required: true
      proxmox_template_management_username:
        description: Authentication username
        type: str
      proxmox_template_management_password:
        description: Authentication password
        type: str
      proxmox_template_management_api_key:
        description: API key for authentication
        type: str
      proxmox_template_management_validate_certs:
        description: Validate SSL certificates
        type: bool
        default: true
      proxmox_template_management_state:
        description: Desired state
        type: str
        default: present
        choices: [present, absent]
