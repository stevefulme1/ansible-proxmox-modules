---
# tasks/main.yml for proxmox_cluster_setup
# Join nodes to cluster, configure HA and quorum

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - proxmox_cluster_setup_host | length > 0
      - proxmox_cluster_setup_name | length > 0 or proxmox_cluster_setup_join
    fail_msg: >-
      proxmox_cluster_setup_host and either proxmox_cluster_setup_name (create)
      or proxmox_cluster_setup_join must be set.
    quiet: true

- name: Build authentication parameters
  ansible.builtin.set_fact:
    _pve_auth:
      api_host: "{{ proxmox_cluster_setup_host }}"
      api_user: "{{ proxmox_cluster_setup_username }}"
      api_password: "{{ proxmox_cluster_setup_password | default(omit, true) }}"
      api_token_id: "{{ proxmox_cluster_setup_api_token_id | default(omit, true) }}"
      api_token_secret: "{{ proxmox_cluster_setup_api_token_secret | default(omit, true) }}"
      validate_certs: "{{ proxmox_cluster_setup_validate_certs }}"
  no_log: true

- name: Gather current cluster info
  stevefulme1.proxmox.proxmox_cluster_info:
    api_host: "{{ _pve_auth.api_host }}"
    api_user: "{{ _pve_auth.api_user }}"
    api_password: "{{ _pve_auth.api_password | default(omit) }}"
    api_token_id: "{{ _pve_auth.api_token_id | default(omit) }}"
    api_token_secret: "{{ _pve_auth.api_token_secret | default(omit) }}"
    validate_certs: "{{ _pve_auth.validate_certs }}"
  register: _cluster_info
  ignore_errors: true

- name: Configure cluster
  block:
    - name: Join node to existing cluster
      stevefulme1.proxmox.proxmox_cluster_join:
        api_host: "{{ _pve_auth.api_host }}"
        api_user: "{{ _pve_auth.api_user }}"
        api_password: "{{ _pve_auth.api_password | default(omit) }}"
        api_token_id: "{{ _pve_auth.api_token_id | default(omit) }}"
        api_token_secret: "{{ _pve_auth.api_token_secret | default(omit) }}"
        validate_certs: "{{ _pve_auth.validate_certs }}"
        hostname: "{{ proxmox_cluster_setup_join_address }}"
        fingerprint: "{{ proxmox_cluster_setup_join_fingerprint }}"
        password: "{{ proxmox_cluster_setup_join_password }}"
        state: present
      when: proxmox_cluster_setup_join

    - name: Set cluster options
      stevefulme1.proxmox.proxmox_cluster_options:
        api_host: "{{ _pve_auth.api_host }}"
        api_user: "{{ _pve_auth.api_user }}"
        api_password: "{{ _pve_auth.api_password | default(omit) }}"
        api_token_id: "{{ _pve_auth.api_token_id | default(omit) }}"
        api_token_secret: "{{ _pve_auth.api_token_secret | default(omit) }}"
        validate_certs: "{{ _pve_auth.validate_certs }}"
        migration: "{{ proxmox_cluster_setup_migration_type }}"
        migration_network: "{{ proxmox_cluster_setup_migration_network | default(omit) }}"
        email_from: "{{ proxmox_cluster_setup_email_from | default(omit) }}"
        state: present
      when: not proxmox_cluster_setup_join

    - name: Create HA groups
      stevefulme1.proxmox.proxmox_ha_group:
        api_host: "{{ _pve_auth.api_host }}"
        api_user: "{{ _pve_auth.api_user }}"
        api_password: "{{ _pve_auth.api_password | default(omit) }}"
        api_token_id: "{{ _pve_auth.api_token_id | default(omit) }}"
        api_token_secret: "{{ _pve_auth.api_token_secret | default(omit) }}"
        validate_certs: "{{ _pve_auth.validate_certs }}"
        name: "{{ item.name }}"
        nodes: "{{ item.nodes }}"
        restricted: "{{ item.restricted | default(false) }}"
        nofailback: "{{ item.nofailback | default(false) }}"
        state: present
      loop: "{{ proxmox_cluster_setup_ha_groups }}"
      when: proxmox_cluster_setup_ha_enabled and proxmox_cluster_setup_ha_groups | length > 0

    - name: Configure HA resources
      stevefulme1.proxmox.proxmox_ha_resource:
        api_host: "{{ _pve_auth.api_host }}"
        api_user: "{{ _pve_auth.api_user }}"
        api_password: "{{ _pve_auth.api_password | default(omit) }}"
        api_token_id: "{{ _pve_auth.api_token_id | default(omit) }}"
        api_token_secret: "{{ _pve_auth.api_token_secret | default(omit) }}"
        validate_certs: "{{ _pve_auth.validate_certs }}"
        vmid: "{{ item.vmid }}"
        group: "{{ item.group }}"
        max_restart: "{{ item.max_restart | default(3) }}"
        max_relocate: "{{ item.max_relocate | default(2) }}"
        state: present
      loop: "{{ proxmox_cluster_setup_ha_resources }}"
      when: proxmox_cluster_setup_ha_enabled and proxmox_cluster_setup_ha_resources | length > 0

    - name: Configure notification endpoints
      stevefulme1.proxmox.proxmox_notification_endpoint:
        api_host: "{{ _pve_auth.api_host }}"
        api_user: "{{ _pve_auth.api_user }}"
        api_password: "{{ _pve_auth.api_password | default(omit) }}"
        api_token_id: "{{ _pve_auth.api_token_id | default(omit) }}"
        api_token_secret: "{{ _pve_auth.api_token_secret | default(omit) }}"
        validate_certs: "{{ _pve_auth.validate_certs }}"
        name: "{{ item.name }}"
        type: "{{ item.type }}"
        server: "{{ item.server | default(omit) }}"
        mailto: "{{ item.mailto | default(omit) }}"
        state: present
      loop: "{{ proxmox_cluster_setup_notification_targets }}"
      when: proxmox_cluster_setup_notification_targets | length > 0

  rescue:
    - name: Cluster setup failed
      ansible.builtin.fail:
        msg: >-
          Cluster setup failed for '{{ proxmox_cluster_setup_name }}':
          {{ ansible_failed_result.msg | default('unknown error') }}
