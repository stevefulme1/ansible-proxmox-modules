---
# defaults/main.yml for proxmox_backup_setup

# Connection
proxmox_backup_setup_host: ""
proxmox_backup_setup_username: "root@pam"
proxmox_backup_setup_password: ""
proxmox_backup_setup_api_token_id: ""
proxmox_backup_setup_api_token_secret: ""
proxmox_backup_setup_validate_certs: true

# PBS datastore setup
proxmox_backup_setup_pbs_host: ""
proxmox_backup_setup_pbs_datastores:
  []
