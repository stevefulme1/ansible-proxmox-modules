  #   path: /mnt/datastore/backups
  #   gc_schedule: "sat 03:00"
  #   prune_keep_daily: 7
  #   prune_keep_weekly: 4
  #   prune_keep_monthly: 6

# Backup jobs on PVE
proxmox_backup_setup_jobs:
  []
