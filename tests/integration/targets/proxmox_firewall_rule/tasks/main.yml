---
# Integration tests for proxmox_firewall_rule
# These require a live Proxmox VE API endpoint.

- name: Create a cluster-level firewall rule
  stevefulme1.proxmox.proxmox_firewall_rule:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password | default(omit) }}"
    api_token_id: "{{ proxmox_api_token_id | default(omit) }}"
    api_token_secret: "{{ proxmox_api_token_secret | default(omit) }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    scope: cluster
    action: ACCEPT
    type: in
    proto: tcp
    dport: "9999"
    comment: "Integration test rule"
    state: present
  register: create_result

- name: Verify rule was created
  ansible.builtin.assert:
    that:
      - create_result.changed
    fail_msg: "Firewall rule creation should report changed=true"

- name: Create same rule again (idempotency)
  stevefulme1.proxmox.proxmox_firewall_rule:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password | default(omit) }}"
    api_token_id: "{{ proxmox_api_token_id | default(omit) }}"
    api_token_secret: "{{ proxmox_api_token_secret | default(omit) }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    scope: cluster
    action: ACCEPT
    type: in
    proto: tcp
    dport: "9999"
    comment: "Integration test rule"
    state: present
  register: idempotent_result

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - not idempotent_result.changed
    fail_msg: "Re-creating the same rule should report changed=false"

- name: Delete the firewall rule
  stevefulme1.proxmox.proxmox_firewall_rule:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password | default(omit) }}"
    api_token_id: "{{ proxmox_api_token_id | default(omit) }}"
    api_token_secret: "{{ proxmox_api_token_secret | default(omit) }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    scope: cluster
    action: ACCEPT
    type: in
    proto: tcp
    dport: "9999"
    state: absent
  register: delete_result

- name: Verify rule was deleted
  ansible.builtin.assert:
    that:
      - delete_result.changed
    fail_msg: "Firewall rule deletion should report changed=true"
