---
- name: Create proxmox_vm
  stevefulme1.proxmox.proxmox_vm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    validate_certs: false
    name: "{{ proxmox_test_name }}"
    state: present
  register: create_result

- name: Verify creation
  ansible.builtin.assert:
    that:
      - create_result is changed

- name: Create same proxmox_vm again (idempotency)
  stevefulme1.proxmox.proxmox_vm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    validate_certs: false
    name: "{{ proxmox_test_name }}"
    state: present
  register: idem_result

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete proxmox_vm
  stevefulme1.proxmox.proxmox_vm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    validate_certs: false
    name: "{{ proxmox_test_name }}"
    state: absent
  register: delete_result

- name: Verify deletion
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete again (idempotency)
  stevefulme1.proxmox.proxmox_vm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password }}"
    validate_certs: false
    name: "{{ proxmox_test_name }}"
    state: absent
  register: delete_idem

- name: Verify delete idempotency
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
