---
# Integration tests for proxmox_storage

- name: Create a directory storage
  stevefulme1.proxmox.proxmox_storage:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password | default(omit) }}"
    api_token_id: "{{ proxmox_api_token_id | default(omit) }}"
    api_token_secret: "{{ proxmox_api_token_secret | default(omit) }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    storage: "{{ proxmox_test_storage }}"
    type: dir
    path: "{{ proxmox_test_storage_path }}"
    content:
      - images
      - iso
    state: present
  register: create_result

- name: Verify storage was created
  ansible.builtin.assert:
    that:
      - create_result.changed
    fail_msg: "Storage creation should report changed=true"

- name: Create same storage again (idempotency)
  stevefulme1.proxmox.proxmox_storage:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password | default(omit) }}"
    api_token_id: "{{ proxmox_api_token_id | default(omit) }}"
    api_token_secret: "{{ proxmox_api_token_secret | default(omit) }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    storage: "{{ proxmox_test_storage }}"
    type: dir
    path: "{{ proxmox_test_storage_path }}"
    content:
      - images
      - iso
    state: present
  register: idempotent_result

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - not idempotent_result.changed

- name: Delete the storage
  stevefulme1.proxmox.proxmox_storage:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}"
    api_password: "{{ proxmox_api_password | default(omit) }}"
    api_token_id: "{{ proxmox_api_token_id | default(omit) }}"
    api_token_secret: "{{ proxmox_api_token_secret | default(omit) }}"
    validate_certs: "{{ proxmox_validate_certs }}"
    storage: "{{ proxmox_test_storage }}"
    state: absent
  register: delete_result

- name: Verify storage was deleted
  ansible.builtin.assert:
    that:
      - delete_result.changed
